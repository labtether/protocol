name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: gofmt -l . | tee /dev/stderr | ! read
        name: Check formatting
      - run: go vet ./...
        name: Vet
      - run: go test ./...
        name: Test
