name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Go files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi
      - run: go vet ./...
        name: Vet
      - run: go test ./...
        name: Test
